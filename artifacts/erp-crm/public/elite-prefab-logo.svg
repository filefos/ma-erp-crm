<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 310" width="660" height="310">

  <!-- House icon centred at x=330 -->

  <!-- Main house solid (navy) -->
  <polygon points="330,16 195,120 232,120 232,174 428,174 428,120 465,120" fill="#0f2d5a"/>

  <!-- Right roof overhang accent (gold) -->
  <polygon points="358,46 465,120 428,120 332,58" fill="#c9942a"/>

  <!-- Chimney (gold) -->
  <rect x="380" y="34" width="28" height="54" fill="#c9942a"/>

  <!-- Window 2x2 pane (gold) -->
  <rect x="282" y="128" width="14" height="14" fill="#c9942a"/>
  <rect x="300" y="128" width="14" height="14" fill="#c9942a"/>
  <rect x="282" y="146" width="14" height="14" fill="#c9942a"/>
  <rect x="300" y="146" width="14" height="14" fill="#c9942a"/>

  <!-- Door (gold) -->
  <rect x="345" y="145" width="28" height="29" fill="#c9942a"/>

  <!-- Ground line: navy left, gold right -->
  <rect x="115" y="174" width="212" height="9" fill="#0f2d5a"/>
  <rect x="327" y="174" width="218" height="9" fill="#c9942a"/>

  <!-- ELITE (gold) -->
  <text x="87" y="242"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="66"
        fill="#c9942a" letter-spacing="2">ELITE</text>

  <!-- PREFAB (navy) -->
  <text x="314" y="242"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="66"
        fill="#0f2d5a" letter-spacing="2">PREFAB</text>

  <!-- Subtitle centred -->
  <text x="330" y="281"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700" font-size="19"
        fill="#0f2d5a" letter-spacing="1.4"
        text-anchor="middle">PRE-FABRICATED HOUSES TRADING CO. LLC</text>
</svg>
