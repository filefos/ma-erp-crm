# MA ERP-CRM — nginx reverse proxy config
# Place at: /etc/nginx/sites-available/ma-erp
# Enable: ln -s /etc/nginx/sites-available/ma-erp /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    server_name 187.127.77.150 _;

    # ── API → Express (port 8080) ─────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 30m;
    }

    # ── Frontend → Vite dist (static files) ──────────────────────
    root /home/deploy/apps/ma-erp/artifacts/erp-crm/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
