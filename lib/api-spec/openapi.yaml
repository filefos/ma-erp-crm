components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        companyId:
          type: integer
          nullable: true
          description: Optional — the company workspace the user wants to enter. Must be in the user's accessibleCompanies. If omitted, the user's primary companyId is used.
      required: [email, password]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required: [currentPassword, newPassword]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    RoleSummary:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        permissionLevel: { type: integer }
        isSystem: { type: boolean }
        permissionCount: { type: integer }
        userCount: { type: integer }
      required: [id, code, name, permissionLevel, isSystem, permissionCount, userCount]

    ModulePermission:
      type: object
      properties:
        module: { type: string }
        canView: { type: boolean }
        canCreate: { type: boolean }
        canEdit: { type: boolean }
        canApprove: { type: boolean }
        canDelete: { type: boolean }
        canExport: { type: boolean }
        canPrint: { type: boolean }
      required: [module, canView, canCreate, canEdit, canApprove, canDelete, canExport, canPrint]

    UpdateRolePermissionsBody:
      type: object
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/ModulePermission"
      required: [permissions]

    NullableActions:
      type: object
      properties:
        canView: { type: boolean, nullable: true }
        canCreate: { type: boolean, nullable: true }
        canEdit: { type: boolean, nullable: true }
        canApprove: { type: boolean, nullable: true }
        canDelete: { type: boolean, nullable: true }
        canExport: { type: boolean, nullable: true }
        canPrint: { type: boolean, nullable: true }

    UserModulePermission:
      type: object
      properties:
        module: { type: string }
        roleDefault:
          type: object
          properties:
            canView: { type: boolean }
            canCreate: { type: boolean }
            canEdit: { type: boolean }
            canApprove: { type: boolean }
            canDelete: { type: boolean }
            canExport: { type: boolean }
            canPrint: { type: boolean }
        override:
          allOf:
            - $ref: "#/components/schemas/NullableActions"
          nullable: true
      required: [module, roleDefault]

    UpdateUserPermissionsBody:
      type: object
      properties:
        permissions:
          type: array
          items:
            allOf:
              - type: object
                properties:
                  module: { type: string }
                required: [module]
              - $ref: "#/components/schemas/NullableActions"
      required: [permissions]

    AuthCompany:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
          nullable: true
        prefix:
          type: string
          nullable: true
      required: [id, name]

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        shortName:
          type: string
