                  $ref: "#/components/schemas/AuditLog"

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      parameters:
        - name: companyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/sales-pipeline:
    get:
      operationId: getSalesPipeline
      tags: [dashboard]
      summary: Get sales pipeline data
      parameters:
        - name: companyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sales pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesPipeline"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /dashboard/pending-approvals:
    get:
      operationId: getPendingApprovals
      tags: [dashboard]
      summary: Get all pending approval items
      responses:
        "200":
          description: Pending approvals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingApprovals"

  /dashboard/inventory-alerts:
    get:
      operationId: getInventoryAlerts
      tags: [dashboard]
      summary: Get low stock inventory alerts
      responses:
        "200":
          description: Inventory alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /dashboard/admin-summary:
    get:
      operationId: getAdminSummary
      tags: [dashboard]
      summary: Get admin-only system overview (companies, users, audit stats)
      responses:
        "200":
          description: Admin summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSummary"

  # ROLES (admin)
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List roles with permission and user counts
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleSummary"

  /roles/{id}/permissions:
    get:
      operationId: getRolePermissions
      tags: [roles]
      summary: Get the full permission matrix for a role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Permission matrix rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModulePermission"
    put:
      operationId: updateRolePermissions
      tags: [roles]
      summary: Replace the permission matrix for a role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRolePermissionsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/permissions:
    get:
      operationId: getUserPermissions
      tags: [users]
      summary: Get a user's effective permission matrix (role baseline + per-user overrides)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User effective permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserModulePermission"
    put:
      operationId: updateUserPermissions
      tags: [users]
      summary: Replace per-user permission overrides
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserPermissionsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /departments/{id}:
    put:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepartmentBody"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        companyId:
          type: integer
          nullable: true
          description: Optional — the company workspace the user wants to enter. Must be in the user's accessibleCompanies. If omitted, the user's primary companyId is used.
      required: [email, password]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required: [currentPassword, newPassword]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    RoleSummary:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        permissionLevel: { type: integer }
        isSystem: { type: boolean }
        permissionCount: { type: integer }
        userCount: { type: integer }
      required: [id, code, name, permissionLevel, isSystem, permissionCount, userCount]

    ModulePermission:
      type: object
      properties:
        module: { type: string }
        canView: { type: boolean }
        canCreate: { type: boolean }
        canEdit: { type: boolean }
        canApprove: { type: boolean }
        canDelete: { type: boolean }
        canExport: { type: boolean }
        canPrint: { type: boolean }
      required: [module, canView, canCreate, canEdit, canApprove, canDelete, canExport, canPrint]

    UpdateRolePermissionsBody:
      type: object
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/ModulePermission"
      required: [permissions]

    NullableActions:
      type: object
      properties:
        canView: { type: boolean, nullable: true }
        canCreate: { type: boolean, nullable: true }
        canEdit: { type: boolean, nullable: true }
        canApprove: { type: boolean, nullable: true }
        canDelete: { type: boolean, nullable: true }
        canExport: { type: boolean, nullable: true }
        canPrint: { type: boolean, nullable: true }

    UserModulePermission:
      type: object
      properties:
        module: { type: string }
        roleDefault:
          type: object
          properties:
            canView: { type: boolean }
            canCreate: { type: boolean }
            canEdit: { type: boolean }
            canApprove: { type: boolean }
            canDelete: { type: boolean }
            canExport: { type: boolean }
            canPrint: { type: boolean }
        override:
          allOf:
            - $ref: "#/components/schemas/NullableActions"
          nullable: true
      required: [module, roleDefault]

    UpdateUserPermissionsBody:
      type: object
      properties:
        permissions:
          type: array
          items:
            allOf:
              - type: object
                properties:
                  module: { type: string }
                required: [module]
              - $ref: "#/components/schemas/NullableActions"
      required: [permissions]

    AuthCompany:
